name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  schedule:
    # Weekly slow-test run — Mondays 06:00 UTC.
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  test-core-only:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-cov

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with black
        run: black --check .

      - name: Type check with mypy
        if: matrix.python-version == '3.11'
        run: python -m mypy src/boa_forecaster

      - name: Security scan (bandit)
        if: matrix.python-version == '3.11'
        run: python -m bandit -r src/ -ll

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short \
            --cov=src/boa_forecaster \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            --cov-config=.coveragerc-core

  test-ml-extras:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (with ML + Prophet extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,ml,prophet]"
          pip install pytest-cov

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src/boa_forecaster --cov-report=term-missing --cov-fail-under=80

  test-deep-extras:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (with deep extras — CPU-only torch)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,deep]" --extra-index-url https://download.pytorch.org/whl/cpu
          pip install pytest-cov

      - name: Run LSTM tests
        continue-on-error: true  # optional — not required for merge
        run: pytest tests/unit/test_lstm.py -v --tb=short -m "slow and requires_torch"

  test-slow:
    # Weekly performance / slow-suite sanity — not run on push/PR to keep
    # those pipelines fast. Deselected elsewhere via `pytest -m "not slow"`
    # on a default run; here we *select* `-m slow` to catch perf regressions
    # (e.g. the 30s budget in test_optimizer_stress.py) and exercise the
    # statsforecast-backed benchmark paths that are too slow for every push.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (with ML extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,ml]"

      - name: Run slow tests
        run: pytest tests/ -v --tb=short -m slow --durations=10

      - name: Run perf benchmarks (regression gate)
        # `--benchmark-autosave` writes `.benchmarks/<machine>/<runid>.json`
        # so comparisons can accumulate run-over-run.  `--benchmark-compare`
        # (no argument) uses the latest previously saved run on this machine
        # as the baseline; `--benchmark-compare-fail=mean:20%` fails the job
        # if any bench's mean time regresses by more than 20% versus that
        # baseline (noise-tolerant, catches real regressions).
        run: |
          pytest tests/perf/ -v --tb=short -m perf \
            --benchmark-only \
            --benchmark-autosave \
            --benchmark-compare \
            --benchmark-compare-fail=mean:20%

      - name: Upload benchmark artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-benchmark-${{ github.run_id }}
          path: .benchmarks/
          if-no-files-found: ignore
          retention-days: 90
